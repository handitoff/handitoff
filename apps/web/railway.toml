[build]
builder = "RAILPACK"
buildCommand = "npm ci && npm run build"
watchPatterns = ["apps/web/**", "packages/**", "package.json", "package-lock.json", "tsconfig.json"]

[deploy]
startCommand = "npm run start -w @handitoff/web"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
