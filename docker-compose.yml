services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -lc "npm install && npm run build -w @handitoff/api && npm run dev:api"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      HANDITOFF_APP_URL: http://localhost:5173
      HANDITOFF_API_URL: http://localhost:8787
      HANDITOFF_WS_URL: ws://localhost:8787/ws
      HANDITOFF_REDIS_URL: redis://redis:6379
    ports:
      - "8787:8787"
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -lc "npm install && npm run dev:web"
    depends_on:
      - api
    environment:
      HANDITOFF_APP_URL: http://localhost:5173
      HANDITOFF_API_URL: http://localhost:8787
      HANDITOFF_WS_URL: ws://localhost:8787/ws
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules

volumes:
  redis-data:
  api-node-modules:
  web-node-modules:
